<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Happy Birthday ❤️</title>
    <style>
        /* Reset and body */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Center Heart */
        .heart {
            width: 120px;
            height: 120px;
            background: red;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 1s infinite;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transition: transform 0.2s;
        }

        .heart:hover {
            transform: rotate(-45deg) scale(1.1);
        }

        .heart::before,
        .heart::after {
            content: "";
            width: 120px;
            height: 120px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -60px;
            left: 0;
        }

        .heart::after {
            left: 60px;
            top: 0;
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1) rotate(-45deg);
            }

            50% {
                transform: scale(1.3) rotate(-45deg);
            }
        }

        /* Popup overlay */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        /* Popup content */
        .popup-content {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.5);
            animation: popupFade 0.5s ease-out;
            position: relative;
            max-width: 350px;
        }

        .popup-content img {
            width: 250px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.6);
        }

        .popup-content h2 {
            font-size: 28px;
            color: #ff1493;
            margin-bottom: 10px;
            text-shadow: 1px 1px 5px #ffb6c1;
        }

        .popup-content p {
            font-size: 18px;
            color: #ff69b4;
        }

        /* Close button */
        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            color: #ff1493;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .close:hover {
            transform: scale(1.2);
        }

        /* Popup fade animation */
        @keyframes popupFade {
            from {
                opacity: 0;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Floating hearts */
        .floating-heart {
            position: absolute;
            width: 15px;
            height: 15px;
            background: red;
            transform: rotate(-45deg);
            animation: float 4s linear infinite;
            border-radius: 50%;
        }

        .floating-heart::before,
        .floating-heart::after {
            content: "";
            width: 15px;
            height: 15px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }

        .floating-heart::before {
            top: -7.5px;
            left: 0;
        }

        .floating-heart::after {
            left: 7.5px;
            top: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1) rotate(-45deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-400px) scale(0.8) rotate(-45deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Beating Heart -->
    <div class="heart" onclick="openPopup()"></div>

    <!-- Popup -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <img src="img/WhatsApp Image 2026-03-31 at 12.38.28 PM.jpeg" alt="Her Photo">
            <h2>Happy Birthday, My Love! ❤️</h2>
            <p>You are my everything. Wishing you a magical day full of love and smiles!</p>
        </div>
    </div>

    <script>
        // Popup logic
        const popup = document.getElementById('popup');

        function openPopup() {
            popup.style.display = 'flex';
            spawnHearts(30);
        }

        function closePopup() {
            popup.style.display = 'none';
            document.querySelectorAll('.floating-heart').forEach(h => h.remove());
        }

        // Generate floating hearts
        function spawnHearts(count) {
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.animationDuration = (3 + Math.random() * 2) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(heart);
            }
        }
    </script>

</body>

</html>
